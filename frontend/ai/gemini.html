<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gemini AI Window</title>
  <script>
    window.addEventListener("message", async (event) => {
      const data = event.data;

      if (data.type === "prompt") {
        const prompt = data.prompt;

        // TODO: Replace with real Gemini API call
        const geminiResponse = "Gemini response to: " + prompt;

        window.opener.postMessage(
          {
            type: "geminiResponse",
            geminiResponse
          },
          "*"
        );
      }
    });
  </script>
</head>
<body>
  <h3>Gemini AI Window</h3>
</body>
</html>
