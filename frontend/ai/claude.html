<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Claude AI Window</title>
  <script>
    window.addEventListener("message", async (event) => {
      const data = event.data;

      if (data.type === "prompt") {
        const prompt = data.prompt;

        // TODO: Replace with real Claude API call
        const claudeResponse = "Claude response to: " + prompt;

        window.opener.postMessage(
          {
            type: "claudeResponse",
            claudeResponse
          },
          "*"
        );
      }
    });
  </script>
</head>
<body>
  <h3>Claude AI Window</h3>
</body>
</html>
